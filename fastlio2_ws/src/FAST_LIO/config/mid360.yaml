common:
    lid_topic:  "/livox/lidar"       # Livox Mid-360 点云输入话题。
    imu_topic:  "/livox/imu"         # Mid-360 内置或配套 IMU 的输入话题。
    time_sync_en: false               # 简易软件时间同步开关；驱动已同步时保持关闭。
    time_offset_lidar_to_imu: 0.0     # 雷达与 IMU 时间戳固定偏移，单位为秒；未知时保持为 0.0。
                                      # 此参数无论 time_sync_en 是否开启都会参与 IMU 时间戳修正。

preprocess:
    lidar_type: 1                     # 点云解析类型：1 = Livox，2 = Velodyne，3 = Ouster，4 = MARSIM。
    scan_line: 4                      # Mid-360 使用的扫描线配置，必须与对应驱动数据格式一致。
    blind: 0.5                        # 近距离盲区，单位为米；过大会删除设备附近有用结构。

mapping:
    acc_cov: 0.1                      # 加速度计过程噪声参数。
    gyr_cov: 0.1                      # 陀螺仪过程噪声参数。
    b_acc_cov: 0.0001                 # 加速度计零偏随机游走参数。
    b_gyr_cov: 0.0001                 # 陀螺仪零偏随机游走参数。
    fov_degree:    360                # Mid-360 的局部地图管理视场角，单位为度，对应其全向水平视场。
    det_range:     100.0              # 局部地图管理采用的探测范围，单位为米。
    extrinsic_est_en:  false          # 是否在线估计雷达与 IMU 外参；已有标定时保持关闭。
    extrinsic_T: [ -0.011, -0.02329, 0.04412 ]  # 雷达到 IMU 的平移外参 [x, y, z]，单位为米。
    extrinsic_R: [ 1, 0, 0,                         # 雷达到 IMU 的旋转矩阵，按行排列。
                   0, 1, 0,
                   0, 0, 1]

publish:
    path_en:  false                   # 是否发布 /path 估计轨迹。
    scan_publish_en:  true            # 是否发布全局坐标系下的配准点云。
    dense_publish_en: true            # 是否发布稠密配准点云；关闭后发布较少点。
    scan_bodyframe_pub_en: true       # 是否发布 IMU 机体坐标系下的配准点云。

pcd_save:
    pcd_save_en: true                 # 是否保存累计 PCD 地图。
    interval: -1                      # 每个文件保存的雷达帧数；-1 表示保存为单个完整文件。
                                      # 长时间建图建议分段保存，以降低内存峰值。
