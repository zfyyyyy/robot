common:
    lid_topic:  "/os_cloud_node/points"  # Ouster 驱动发布的 PointCloud2 点云话题。
    imu_topic:  "/os_cloud_node/imu"     # Ouster 驱动发布的 IMU 话题。
    time_sync_en: false                   # 简易软件时间同步开关；已使用 PTP、GPS 或统一时钟时保持关闭。
    time_offset_lidar_to_imu: 0.0         # 雷达与 IMU 时间戳固定偏移，单位为秒；未知时保持为 0.0。
                                          # 该参数始终生效，错误值会导致运动去畸变和姿态估计异常。

preprocess:
    lidar_type: 3                     # 点云解析类型 3 表示 Ouster PointCloud2 数据。
    scan_line: 64                     # 垂直扫描通道数，此处对应 64 线型号，必须与实际雷达配置一致。
    timestamp_unit: 3                 # PointCloud2 中每个点的时间字段单位：0=秒，1=毫秒，2=微秒，3=纳秒。
                                      # 单位设置错误会直接破坏逐点时间和运动去畸变结果。
    blind: 4                          # 近距离盲区，单位为米；小于该距离的点会被忽略。

mapping:
    acc_cov: 0.1                      # 加速度计过程噪声参数。
    gyr_cov: 0.1                      # 陀螺仪过程噪声参数。
    b_acc_cov: 0.0001                 # 加速度计零偏随机游走参数。
    b_gyr_cov: 0.0001                 # 陀螺仪零偏随机游走参数。
    fov_degree:    180                # 局部地图管理视场角，单位为度。
    det_range:     150.0              # 局部地图管理采用的探测范围，单位为米。
    extrinsic_est_en:  false          # 是否在线估计 Ouster 与 IMU 之间的外参。
    extrinsic_T: [ 0.0, 0.0, 0.0 ]   # 雷达到 IMU 的平移外参 [x, y, z]，单位为米。
    extrinsic_R: [1, 0, 0,                         # 雷达到 IMU 的旋转矩阵，按行排列。
                  0, 1, 0,
                  0, 0, 1]

publish:
    path_en:  false                   # 是否发布 /path 估计轨迹。
    scan_publish_en:  true            # 是否发布全局坐标系下的配准点云。
    dense_publish_en: true            # 是否发布稠密配准点云；关闭可降低网络和 RViz 压力。
    scan_bodyframe_pub_en: true       # 是否发布 IMU 机体坐标系下的配准点云。

pcd_save:
    pcd_save_en: true                 # 是否保存累计 PCD 地图。
    interval: -1                      # 每个文件保存的雷达帧数；-1 表示所有帧写入一个文件。
                                      # 数据规模较大时建议设置正数进行分段保存。
