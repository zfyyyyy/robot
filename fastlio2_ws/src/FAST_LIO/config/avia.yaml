common:
    lid_topic:  "/livox/lidar"       # Livox Avia 点云输入话题，消息类型通常为 livox_ros_driver/CustomMsg。
    imu_topic:  "/livox/imu"         # IMU 输入话题，提供三轴角速度和三轴加速度测量。
    time_sync_en: false               # FAST-LIO2 简易软件时间同步开关；已有硬件同步或数据集已同步时应保持关闭。
    time_offset_lidar_to_imu: 0.0     # 雷达与 IMU 时间戳的固定偏移，单位为秒，应由 LI-Init 等工具标定。
                                      # 当前代码会从 IMU 时间戳中减去该值；偏移未知时必须保持为 0.0。

preprocess:
    lidar_type: 1                     # 点云解析类型：1 = Livox，2 = Velodyne，3 = Ouster，4 = MARSIM 仿真点云。
    scan_line: 6                      # Avia 使用的扫描线配置，必须与雷达及驱动格式匹配，增大该值不会产生更多点。
    blind: 4                          # 近距离盲区，单位为米；距离雷达小于该值的点会在预处理阶段被忽略。

mapping:
    acc_cov: 0.1                      # 加速度计过程噪声参数，影响滤波器对加速度测量的信任程度。
    gyr_cov: 0.1                      # 陀螺仪过程噪声参数，影响滤波器对角速度测量的信任程度。
    b_acc_cov: 0.0001                 # 加速度计零偏随机游走参数，描述加速度零偏随时间变化的速度。
    b_gyr_cov: 0.0001                 # 陀螺仪零偏随机游走参数，描述陀螺仪零偏随时间变化的速度。
    fov_degree:    90                 # 局部地图管理采用的雷达视场角，单位为度，不是 RViz 的显示视角。
    det_range:     450.0              # 局部地图管理采用的探测范围，单位为米；过大会增加地图维护开销。
    extrinsic_est_en:  false          # 是否在线估计雷达与 IMU 外参；已有可靠标定时应保持关闭。
    extrinsic_T: [ 0.04165, 0.02326, -0.0284 ]  # 雷达到 IMU 的平移外参 [x, y, z]，单位为米。
    extrinsic_R: [ 1, 0, 0,                         # 雷达到 IMU 的 3×3 旋转矩阵，按行排列；单位矩阵表示轴方向一致。
                   0, 1, 0,
                   0, 0, 1]

publish:
    path_en:  false                   # 是否发布 /path 估计轨迹；仅影响输出，不改变核心状态估计。
    scan_publish_en:  true            # 是否发布全局坐标系下的配准点云；关闭可降低通信和显示负担。
    dense_publish_en: true            # 是否发布稠密配准点云；关闭后发布较少点，主要影响输出密度。
    scan_bodyframe_pub_en: true       # 是否发布 IMU 机体坐标系下的配准点云，用于观察雷达相对设备的当前扫描。

pcd_save:
    pcd_save_en: true                 # 是否把累计地图保存为 PCD；长数据集会占用较多内存和磁盘空间。
    interval: -1                      # 每个 PCD 文件包含的雷达帧数；正数表示按指定帧数分段保存。
                                      # -1 表示所有帧写入一个文件，数据量过大时可能因内存不足而崩溃。
