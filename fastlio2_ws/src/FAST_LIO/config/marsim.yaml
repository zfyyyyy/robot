common:
    lid_topic:  "/quad0_pcl_render_node/sensor_cloud"  # MARSIM 渲染节点发布的仿真点云话题。
    imu_topic:  "/quad_0/imu"                         # 仿真飞行器 IMU 话题。
    time_sync_en: false                                # 仿真消息通常使用统一时钟，因此一般不启用软件同步。
    time_offset_lidar_to_imu: 0.0                      # 仿真雷达与 IMU 的固定时间偏移，单位为秒；同步时保持 0.0。

preprocess:
    lidar_type: 4                     # 点云解析类型 4 表示 MARSIM 仿真点云，不适用于真实 Livox、Velodyne 或 Ouster。
    scan_line: 4                      # 仿真雷达扫描线配置，必须与 MARSIM 传感器模型一致。
    blind: 0.5                        # 仿真近距离盲区，单位为米。

mapping:
    acc_cov: 0.1                      # 仿真加速度计过程噪声参数，应与仿真器设置的 IMU 噪声匹配。
    gyr_cov: 0.1                      # 仿真陀螺仪过程噪声参数。
    b_acc_cov: 0.0001                 # 仿真加速度计零偏随机游走参数。
    b_gyr_cov: 0.0001                 # 仿真陀螺仪零偏随机游走参数。
    fov_degree:    90                 # 局部地图管理视场角，单位为度。
    det_range:     50.0               # 仿真雷达有效探测范围，单位为米。
    extrinsic_est_en:  false          # 是否在线估计仿真雷达与 IMU 外参；已知模型安装关系时保持关闭。
    extrinsic_T: [ -0.0, -0.0, 0.0 ] # 雷达到 IMU 的平移外参 [x, y, z]，单位为米。
    extrinsic_R: [ 1, 0, 0,                         # 雷达到 IMU 的旋转矩阵，按行排列。
                   0, 1, 0,
                   0, 0, 1]

publish:
    path_en:  false                   # 是否发布 /path 估计轨迹，可用于与仿真真值轨迹比较。
    scan_publish_en:  true            # 是否发布全局坐标系下的配准点云。
    dense_publish_en: true            # 是否发布稠密配准点云。
    scan_bodyframe_pub_en: true       # 是否发布 IMU 机体坐标系下的配准点云。

pcd_save:
    pcd_save_en: true                 # 是否保存仿真建图结果为 PCD 文件。
    interval: -1                      # 每个文件保存的雷达帧数；-1 表示全部帧保存到一个文件。
                                      # 仿真时间较长时建议分段保存，避免内存占用持续增长。
